version: "3.8"
services:
  ipfs:
    image: ipfs/kubo:latest
    restart: unless-stopped
    environment:
      - IPFS_PROFILE=server
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
    ports:
      - 4001:4001/tcp
      - 4001:4001/udp
      - 8080
      - 5001
volumes:
  ipfs_data: {}
  ipfs_staging: {}
