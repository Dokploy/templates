[variables]
main_domain = "${domain}"

# Required for the bundled Firecrawl, NuQ, and PostgreSQL services.
postgres_user = "postgres"
postgres_password = "${password:32}"
postgres_db = "postgres"
bull_auth_key = "${password:32}"

# Safe defaults for self-hosted deployments. Leave unchanged unless you know you need them.
use_db_authentication = "false"
allow_local_webhooks = "false"
block_media = "false"

# Optional LLM provider settings. Leave empty unless you plan to use that provider.
openai_api_key = ""
openai_base_url = ""
openrouter_api_key = ""
ollama_base_url = ""
model_name = ""
model_embedding_name = ""
llamaparse_api_key = ""

# Optional outbound proxy settings for restricted networks or paid proxy pools.
proxy_server = ""
proxy_username = ""
proxy_password = ""

# Optional search provider settings used by Firecrawl search features.
searxng_endpoint = ""
searxng_engines = ""
searxng_categories = ""

# Optional auth, indexing, integrations, and telemetry.
# Firecrawl DB auth mode requires Supabase URL, replica URL, and service token.
# Index/search features may also use the separate index Supabase settings.
supabase_anon_token = ""
supabase_url = ""
supabase_replica_url = ""
supabase_service_token = ""
index_supabase_url = ""
index_supabase_service_token = ""
search_index_supabase_url = ""
test_api_key = ""
slack_webhook_url = ""
posthog_api_key = ""
posthog_host = ""
self_hosted_webhook_url = ""
autumn_secret_key = ""

# Optional tuning. Leave empty to use the defaults baked into docker-compose.
num_workers_per_queue = ""
crawl_concurrent_requests = ""
max_concurrent_jobs = ""
browser_pool_size = ""
logging_level = ""
max_cpu = ""
max_ram = ""

[config]
env = [
  # Required runtime and bundled service wiring.
  "PORT=3002",
  "HOST=0.0.0.0",
  "POSTGRES_HOST=nuq-postgres",
  "POSTGRES_PORT=5432",
  "POSTGRES_USER=${postgres_user}",
  "POSTGRES_PASSWORD=${postgres_password}",
  "POSTGRES_DB=${postgres_db}",
  "REDIS_URL=redis://redis:6379",
  "REDIS_RATE_LIMIT_URL=redis://redis:6379",
  "NUQ_RABBITMQ_URL=amqp://rabbitmq:5672",
  "PLAYWRIGHT_MICROSERVICE_URL=http://playwright-service:3000/scrape",

  # DB auth is off by default. If enabled, set the required Supabase auth values too.
  "USE_DB_AUTHENTICATION=${use_db_authentication}",

  # Generated internal secret used by Firecrawl's worker and Bull auth flows.
  "BULL_AUTH_KEY=${bull_auth_key}",

  # Optional LLM provider settings. Leave empty unless you plan to use them.
  "OPENAI_API_KEY=${openai_api_key}",
  "OPENAI_BASE_URL=${openai_base_url}",
  "OPENROUTER_API_KEY=${openrouter_api_key}",
  "OLLAMA_BASE_URL=${ollama_base_url}",
  "MODEL_NAME=${model_name}",
  "MODEL_EMBEDDING_NAME=${model_embedding_name}",
  "LLAMAPARSE_API_KEY=${llamaparse_api_key}",

  # Optional outbound proxy settings.
  "PROXY_SERVER=${proxy_server}",
  "PROXY_USERNAME=${proxy_username}",
  "PROXY_PASSWORD=${proxy_password}",

  # Optional search provider settings.
  "SEARXNG_ENDPOINT=${searxng_endpoint}",
  "SEARXNG_ENGINES=${searxng_engines}",
  "SEARXNG_CATEGORIES=${searxng_categories}",

  # Optional auth, indexing, integrations, and telemetry. DB auth mode requires
  # SUPABASE_URL, SUPABASE_REPLICA_URL, and SUPABASE_SERVICE_TOKEN.
  "SUPABASE_ANON_TOKEN=${supabase_anon_token}",
  "SUPABASE_URL=${supabase_url}",
  "SUPABASE_REPLICA_URL=${supabase_replica_url}",
  "SUPABASE_SERVICE_TOKEN=${supabase_service_token}",
  "INDEX_SUPABASE_URL=${index_supabase_url}",
  "INDEX_SUPABASE_SERVICE_TOKEN=${index_supabase_service_token}",
  "SEARCH_INDEX_SUPABASE_URL=${search_index_supabase_url}",
  "TEST_API_KEY=${test_api_key}",
  "SLACK_WEBHOOK_URL=${slack_webhook_url}",
  "POSTHOG_API_KEY=${posthog_api_key}",
  "POSTHOG_HOST=${posthog_host}",
  "SELF_HOSTED_WEBHOOK_URL=${self_hosted_webhook_url}",
  "AUTUMN_SECRET_KEY=${autumn_secret_key}",

  # Optional feature flags with safe defaults already set in [variables].
  "ALLOW_LOCAL_WEBHOOKS=${allow_local_webhooks}",
  "BLOCK_MEDIA=${block_media}",

  # Optional tuning and resource limits. Leave empty to inherit compose defaults.
  "NUM_WORKERS_PER_QUEUE=${num_workers_per_queue}",
  "CRAWL_CONCURRENT_REQUESTS=${crawl_concurrent_requests}",
  "MAX_CONCURRENT_JOBS=${max_concurrent_jobs}",
  "BROWSER_POOL_SIZE=${browser_pool_size}",
  "LOGGING_LEVEL=${logging_level}",
  "MAX_CPU=${max_cpu}",
  "MAX_RAM=${max_ram}"
]
mounts = []

[[config.domains]]
serviceName = "api"
port = 3002
host = "${main_domain}"
path = "/"
