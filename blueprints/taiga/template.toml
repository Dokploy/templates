[variables]
main_domain = "${domain}"
postgres_password = "${password:32}"
secret_key = "${password:64}"
rabbitmq_password = "${password:32}"
rabbitmq_erlang_cookie = "${password:48}"

[config]
mounts = []

[[config.domains]]
serviceName = "taiga-gateway"
port = 80
host = "${main_domain}"

[config.env]
TAIGA_DOMAIN = "${main_domain}"
TAIGA_SCHEME = "https"
TAIGA_SITES_DOMAIN = "${main_domain}"
TAIGA_SITES_SCHEME = "https"
WEBSOCKETS_SCHEME = "wss"
TAIGA_SUBPATH = ""
POSTGRES_DB = "taiga"
POSTGRES_USER = "taiga"
POSTGRES_PASSWORD = "${postgres_password}"
POSTGRES_HOST = "taiga-db"
TAIGA_SECRET_KEY = "${secret_key}"
RABBITMQ_USER = "taiga"
RABBITMQ_PASS = "${rabbitmq_password}"
RABBITMQ_VHOST = "taiga"
RABBITMQ_ERLANG_COOKIE = "${rabbitmq_erlang_cookie}"
ATTACHMENTS_MAX_AGE = "360"
ENABLE_TELEMETRY = "False"
EMAIL_BACKEND = "console"
EMAIL_HOST = "smtp.example.com"
EMAIL_PORT = "587"
EMAIL_HOST_USER = ""
EMAIL_HOST_PASSWORD = ""
EMAIL_DEFAULT_FROM = "taiga@example.com"
DEFAULT_FROM_EMAIL = "taiga@example.com"
EMAIL_USE_TLS = "False"
EMAIL_USE_SSL = "False"

[[config.mounts]]
filePath = "/etc/nginx/taiga.conf"
content = """
server {
    listen 80 default_server;
    client_max_body_size 100M;
    charset utf-8;

    location / {
        proxy_pass http://taiga-front/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
    }

    location /api/ {
        proxy_pass http://taiga-back:8000/api/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
    }

    location /admin/ {
        proxy_pass http://taiga-back:8000/admin/;
        proxy_pass_header Server;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
    }

    location /static/ {
        alias /taiga/static/;
    }

    location /_protected/ {
        internal;
        alias /taiga/media/;
        add_header Content-disposition "attachment";
    }

    location /media/exports/ {
        alias /taiga/media/exports/;
        add_header Content-disposition "attachment";
    }

    location /media/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://taiga-protected:8003/;
        proxy_redirect off;
    }

    location /events {
        proxy_pass http://taiga-events:8888/events;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
}
"""
