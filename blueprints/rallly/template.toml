[variables]
main_domain = "${domain}"
postgres_password = "${password:32}"
secret_password = "${base64:32}"
garage_rpc_secret = "${hash:64}"
s3_access_key_id = "${username}"
s3_secret_access_key = "${password:32}"
support_email = "${email}"
noreply_email = "${email}"
initial_admin_email = "${email}"

[config]
[[config.domains]]
serviceName = "rallly"
port = 3000
host = "${main_domain}"

[config.env]
NEXT_PUBLIC_BASE_URL = "http://${main_domain}"
DATABASE_URL = "postgres://postgres:${postgres_password}@db:5432/rallly"
S3_ENDPOINT = "http://garage:3900"
S3_BUCKET_NAME = "rallly"
S3_REGION = "garage"
S3_ACCESS_KEY_ID = "${s3_access_key_id}"
S3_SECRET_ACCESS_KEY = "${s3_secret_access_key}"
SECRET_PASSWORD = "${secret_password}"
POSTGRES_PASSWORD = "${postgres_password}"
GARAGE_RPC_SECRET = "${garage_rpc_secret}"
SUPPORT_EMAIL = "${support_email}"
NOREPLY_EMAIL = "${noreply_email}"
SMTP_HOST = ""
SMTP_PORT = "587"
SMTP_USER = ""
SMTP_PWD = ""
SMTP_SECURE = "false"
ALLOWED_EMAILS = ""
INITIAL_ADMIN_EMAIL = "${initial_admin_email}"

[[config.mounts]]
filePath = "garage.toml"
content = """
metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"

db_engine = "sqlite"
replication_factor = 1
rpc_bind_addr = "[::]:3901"
rpc_public_addr = "localhost:3901"
rpc_secret = "${garage_rpc_secret}"

[s3_api]
api_bind_addr = "[::]:3900"
s3_region = "garage"
root_domain = ".s3.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
"""
