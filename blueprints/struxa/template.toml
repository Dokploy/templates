[variables]
main_domain = "${domain}"
image_tag = "latest"
mysql_root_password = "${password:32}"
mysql_password = "${password:32}"
better_auth_secret = "${base64:32}"
db_encryption_key = "${hash:32}"
minio_access_key = "${username}"
minio_secret_key = "${password:32}"

[config]
env = [
  "IMAGE_TAG=${image_tag}",
  "MYSQL_ROOT_PASSWORD=${mysql_root_password}",
  "MYSQL_DATABASE=struxa",
  "MYSQL_USER=struxa",
  "MYSQL_PASSWORD=${mysql_password}",
  "DATABASE_URL=mysql://struxa:${mysql_password}@mysql:3306/struxa",
  "BETTER_AUTH_SECRET=${better_auth_secret}",
  "BETTER_AUTH_URL=https://${main_domain}",
  "APP_URL=https://${main_domain}",
  "CORS_ORIGIN=https://${main_domain}",
  "DATABASE_ENCRYPTION_KEY=${db_encryption_key}",
  "MINIO_ENDPOINT=http://minio:9000",
  "MINIO_ACCESS_KEY=${minio_access_key}",
  "MINIO_SECRET_KEY=${minio_secret_key}",
  "MINIO_BUCKET=struxa",
]
mounts = []

[[config.domains]]
serviceName = "web"
port = 3001
host = "${main_domain}"
