version: "3.8"

services:
  web:
    image: makeplane/plane-frontend:${APP_RELEASE:-v1.2.3}
    restart: always
    depends_on:
      - api
      - worker
    env_file:
      - .env

  space:
    image: makeplane/plane-space:${APP_RELEASE:-v1.2.3}
    restart: always
    depends_on:
      - api
      - worker
      - web
    env_file:
      - .env

  admin:
    image: makeplane/plane-admin:${APP_RELEASE:-v1.2.3}
    restart: always
    depends_on:
      - api
      - web
    env_file:
      - .env

  live:
    image: makeplane/plane-live:${APP_RELEASE:-v1.2.3}
    restart: always
    depends_on:
      - api
      - web
    env_file:
      - .env

  api:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.2.3}
    restart: always
    command: ./bin/docker-entrypoint-api.sh
    volumes:
      - logs_api:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  worker:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.2.3}
    restart: always
    command: ./bin/docker-entrypoint-worker.sh
    volumes:
      - logs_worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  beat-worker:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.2.3}
    restart: always
    command: ./bin/docker-entrypoint-beat.sh
    volumes:
      - logs_beat-worker:/code/plane/logs
    depends_on:
      - api
      - plane-db
      - plane-redis
      - plane-mq
    env_file:
      - .env

  migrator:
    image: makeplane/plane-backend:${APP_RELEASE:-v1.2.3}
    restart: on-failure
    command: ./bin/docker-entrypoint-migrator.sh
    volumes:
      - logs_migrator:/code/plane/logs
    depends_on:
      - plane-db
      - plane-redis
    env_file:
      - .env

  plane-db:
    image: postgres:15.7-alpine
    restart: always
    command: postgres -c 'max_connections=1000'
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      - .env

  plane-redis:
    image: valkey/valkey:7.2.11-alpine
    restart: always
    volumes:
      - redisdata:/data

  plane-mq:
    image: rabbitmq:3.13.6-management-alpine
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    env_file:
      - .env

  plane-storage:
    image: rustfs/rustfs:latest
    restart: always
    volumes:
      - uploads:/data
    env_file:
      - .env

  proxy:
    image: makeplane/plane-proxy:${APP_RELEASE:-v1.2.3}
    restart: always
    depends_on:
      - web
      - api
      - space
      - admin
      - live
    volumes:
      - proxy_config:/config
      - proxy_data:/data
    env_file:
      - .env

volumes:
  pgdata:
  redisdata:
  uploads:
  logs_api:
  logs_worker:
  logs_beat-worker:
  logs_migrator:
  rabbitmq_data:
  proxy_config:
  proxy_data:
