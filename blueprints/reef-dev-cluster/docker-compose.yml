version: "3.8"

services:
  reef-dev-cluster:
    image: anukulpandey/reef-chain-node:latest
    restart: unless-stopped
    working_dir: /workspace

    environment:
      v1sec: "${v1sec:-}"
      v2sec: "${v2sec:-}"
      v3sec: "${v3sec:-}"
      faucetsec: "${faucetsec:-}"
      DEFAULT_AMOUNT: "${DEFAULT_AMOUNT:-1}"
      MAX_AMOUNT: "${MAX_AMOUNT:-10}"

    volumes:
      - reef-dev-cluster-state:/workspace/state
      - reef-dev-cluster-download:/workspace/download

    expose:
      - "30335"
      - "30333"
      - "30334"
      - "30336"
      - "8001"
      - "9944"
      - "8545"
      - "8080"

    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e

        echo '📦 Installing required tools...'
        apt-get update
        apt-get install -y wget curl python3 ca-certificates gnupg

        mkdir -p /etc/apt/keyrings /workspace /workspace/state /workspace/download
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
        echo 'deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main' > /etc/apt/sources.list.d/nodesource.list
        apt-get update
        apt-get install -y nodejs

        echo '📥 Downloading cluster bootstrap...'
        wget -O /workspace/run-cluster.sh https://raw.githubusercontent.com/anukulpandey/dokploy-templates/182735be1afc163b0e99f28871ec5b6cb3c03cc3/blueprints/reef-dev-cluster/run-cluster.sh

        echo '🔧 Making script executable...'
        chmod +x /workspace/run-cluster.sh

        echo '🚀 Starting self-contained network...'
        exec env TEMPLATE_ASSET_REF=182735be1afc163b0e99f28871ec5b6cb3c03cc3 /workspace/run-cluster.sh

  reef-dev-cluster-eth-rpc:
    image: anukulpandey/reef-chain-eth-rpc:latest
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      - reef-dev-cluster
    network_mode: "service:reef-dev-cluster"
    environment:
      NODE_RPC_URL: ws://127.0.0.1:9944
      PORT: "8545"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        until eth-rpc --node-rpc-url "$$NODE_RPC_URL" --rpc-port "$$PORT" --rpc-external --rpc-cors all; do
          echo 'eth-rpc is waiting for the ws rpc node...'
          sleep 2
        done

volumes:
  reef-dev-cluster-state:
  reef-dev-cluster-download:
