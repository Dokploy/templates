[variables]
main_domain = "${domain}"
pangolin_secret = "${base64:64}"
letsencrypt_email = "${email}"
gerbil_endpoint = "${main_domain}"

[[config.domains]]
serviceName = "traefik"
port = 80
host = "${main_domain}"

# PANGOLIN_CONFIG: single-line YAML with \n for newlines; pangolin writes it to /app/config/config.yml at startup.
# This works even when Dokploy mounts config files only on one service (e.g. traefik).
[config.env]
SERVER_SECRET = "${pangolin_secret}"
# Single-quoted YAML so .env is not broken by double quotes; \n for newlines.
PANGOLIN_CONFIG = "app:\n  dashboard_url: 'https://${main_domain}'\n  log_level: 'info'\n\ndomains:\n  domain1:\n    base_domain: '${main_domain}'\n    cert_resolver: 'letsencrypt'\n    prefer_wildcard_cert: false\n\nserver:\n  integration_port: 3003\n  external_port: 3000\n  internal_port: 3001\n  next_port: 3002\n  internal_hostname: 'pangolin'\n  session_cookie_name: 'p_session_token'\n  resource_access_token_param: 'p_token'\n  resource_access_token_headers:\n    id: 'P-Access-Token-Id'\n    token: 'P-Access-Token'\n  dashboard_session_length_hours: 720\n  resource_session_length_hours: 720\n  trust_proxy: 1\n  secret: '${pangolin_secret}'\n\ngerbil:\n  base_endpoint: '${gerbil_endpoint}'\n  use_subnet: false\n  subnet_group: '100.89.137.0/20'\n  block_size: 24\n  site_block_size: 30\n\norgs:\n  block_size: 24\n  subnet_group: '100.90.128.0/20'\n  utility_subnet_group: '100.96.128.0/20'\n\ntraefik:\n  http_entrypoint: 'web'\n  https_entrypoint: 'websecure'\n  cert_resolver: 'letsencrypt'\n  prefer_wildcard_cert: false\n  file_mode: true\n  site_types: ['newt', 'wireguard', 'local']\n  allow_raw_resources: true\n\nflags:\n  require_email_verification: false\n  disable_signup_without_invite: false\n  disable_user_create_org: false\n  allow_raw_resources: false\n  enable_integration_api: false\n  disable_local_sites: false\n  disable_basic_wireguard_sites: false"

[[config.mounts]]
serviceName = "traefik"
filePath = "/etc/traefik/traefik_config.yml"
content = """
api:
  insecure: true
  dashboard: true

providers:
  file:
    filename: "/etc/traefik/dynamic_config.yml"
    watch: true

log:
  level: "INFO"
  format: "common"
  maxSize: 100
  maxBackups: 3
  maxAge: 3
  compress: true

certificatesResolvers:
  letsencrypt:
    acme:
      httpChallenge:
        entryPoint: web
      email: "${letsencrypt_email}"
      storage: "/letsencrypt/acme.json"
      caServer: "https://acme-v02.api.letsencrypt.org/directory"

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    transport:
      respondingTimeouts:
        readTimeout: "30m"
    http:
      tls:
        certResolver: letsencrypt
      encodedCharacters:
        allowEncodedSlash: true
        allowEncodedQuestionMark: true

serversTransport:
  insecureSkipVerify: true

ping:
  entryPoint: "web"
"""

[[config.mounts]]
serviceName = "traefik"
filePath = "/etc/traefik/dynamic_config.yml"
content = """
http:
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https

  routers:
    # HTTP to HTTPS redirect router
    main-app-router-redirect:
      rule: "Host(`${main_domain}`)"
      service: next-service
      entryPoints:
        - web
      middlewares:
        - redirect-to-https

    # Next.js router (handles everything except API and WebSocket paths)
    next-router:
      rule: "Host(`${main_domain}`) && !PathPrefix(`/api/v1`)"
      service: next-service
      priority: 10
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    # API router (handles /api/v1 paths)
    api-router:
      rule: "Host(`${main_domain}`) && PathPrefix(`/api/v1`)"
      service: api-service
      priority: 100
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    # WebSocket router
    ws-router:
      rule: "Host(`${main_domain}`)"
      service: api-service
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    next-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3002"

    api-service:
      loadBalancer:
        servers:
          - url: "http://pangolin:3001"
"""
