[variables]
main_domain = "${domain}"
second_domain = "${domain}"
secret_base = "${base64:64}"

[config]
[[config.domains]]
serviceName = "dash"
port = 3000
host = "${main_domain}"
[[config.domains]]
serviceName = "status-page"
port = 3001
host = "${second_domain}"


[config.env]
BETTER_AUTH_SECRET = "${secret_base}"
BETTER_AUTH_URL = "http://${main_domain}"
NEXT_PUBLIC_URL = "http://${main_domain}"
DASH_PORT=3000
STATUS_PAGE_PORT=3001

[[config.mounts]]