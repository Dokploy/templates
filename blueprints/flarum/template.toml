[variables]
main_domain = "${domain}"
db_password = "${password:16}"
db_root_password = "${password:16}"
db_user = "flarum"
db_name = "flarum"

[config]
[[config.domains]]
serviceName = "flarum"
port = 8000
host = "${main_domain}"

[config.env]
FLARUM_DOMAIN = "${main_domain}"
DB_NAME = "${db_name}"
DB_USER = "${db_user}"
DB_PASSWORD = "${db_password}"
MYSQL_ROOT_PASSWORD = "${db_root_password}"
