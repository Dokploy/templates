services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockge_data:/app/data
      - dockge_stacks:/opt/stacks
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    ports:
      - "5001"

volumes:
  dockge_data:
  dockge_stacks:
