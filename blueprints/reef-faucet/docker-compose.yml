services:
  reef-faucet:
    image: anukulpandey/reef-chain-node:linux-2
    working_dir: /workspace

    ports:
      - "${PORT}:${PORT}"

    environment:
      WS_ENDPOINT: ${WS_ENDPOINT}
      EVM_RPC_URL: ${EVM_RPC_URL}
      FAUCET_SEED: ${FAUCET_SEED}
      PORT: ${PORT}
      DEFAULT_AMOUNT: ${DEFAULT_AMOUNT}
      MAX_AMOUNT: ${MAX_AMOUNT}

    volumes:
      - ./output:/output

    entrypoint: /bin/sh
    command: -c "
      set -e &&

      echo '📦 Installing dependencies...' &&
      apt-get update &&
      apt-get install -y nodejs npm wget ca-certificates &&

      echo '📥 Downloading faucet sources...' &&
      mkdir -p /workspace/faucet &&
      wget -O /workspace/faucet/package.json \
        https://raw.githubusercontent.com/anukulpandey/dokploy-reef-chain-scripts/main/faucet/package.json &&
      wget -O /workspace/faucet/server.js \
        https://raw.githubusercontent.com/anukulpandey/dokploy-reef-chain-scripts/main/faucet/server.js &&

      echo '📦 Installing faucet npm dependencies...' &&
      cd /workspace/faucet &&
      npm install --omit=dev &&

      echo '🚰 Starting Reef faucet on port $PORT' &&
      exec npm start"
