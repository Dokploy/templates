version: "3.8"

services:
  reef-dev-cluster:
    image: anukulpandey/reef-chain-node:linux-2
    restart: unless-stopped
    working_dir: /workspace

    environment:
      v1sec: "${v1sec}"
      v2sec: "${v2sec}"
      v3sec: "${v3sec}"
      faucetsec: "${faucetsec}"
      DEFAULT_AMOUNT: "${DEFAULT_AMOUNT}"
      MAX_AMOUNT: "${MAX_AMOUNT}"

    volumes:
      - ./:/workspace

    expose:
      - "30335"
      - "30333"
      - "30334"
      - "30336"
      - "8001"
      - "9944"
      - "8545"
      - "8080"

    entrypoint: /bin/sh
    command: -c "
      set -e &&

      echo '📦 Installing required tools...' &&
      apt-get update &&
      apt-get install -y wget curl python3 nodejs npm ca-certificates &&

      echo '🔧 Making script executable...' &&
      chmod +x /workspace/run-cluster.sh &&

      echo '🚀 Starting self-contained network...' &&
      exec /workspace/run-cluster.sh"
