services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mail-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentroy -d maildb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - mail-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rspamd:
    image: ghcr.io/sentroy-co/sentroy-oss-mailserver-rspamd:latest
    restart: unless-stopped
    volumes:
      - mail-dkim:/etc/rspamd/dkim
    depends_on:
      redis:
        condition: service_healthy

  postfix:
    image: ghcr.io/sentroy-co/sentroy-oss-mailserver-postfix:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    volumes:
      - mail-data:/var/mail
      - mail-dkim:/etc/rspamd/dkim:ro
      - mail-virtual:/etc/postfix/virtual
    depends_on:
      - rspamd

  dovecot:
    image: ghcr.io/sentroy-co/sentroy-oss-mailserver-dovecot:latest
    restart: unless-stopped
    ports:
      - "143:143"
      - "993:993"
    volumes:
      - mail-data:/var/mail
      - mail-users:/etc/dovecot/users-data
    depends_on:
      - postfix

  api:
    image: ghcr.io/sentroy-co/sentroy-oss-mailserver-api:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mail-dkim:/etc/rspamd/dkim
      - mail-virtual:/etc/postfix/virtual
      - mail-users:/etc/dovecot/users-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mail-pg:
    driver: local
  mail-redis:
    driver: local
  mail-data:
    driver: local
  mail-dkim:
    driver: local
  mail-virtual:
    driver: local
  mail-users:
    driver: local
