[variables]
main_domain = "${domain}"
llm_provider = "openai/gpt-4o-mini"
llm_temperature = "0.1"
security_enabled = "true"
jwt_enabled = "true"
default_rate_limit = "120/minute"
jwt_secret = "${password:48}"
max_pages = "40"

[config]
[[config.domains]]
serviceName = "crawl4ai"
port = 11235
host = "${main_domain}"

[config.env]
LLM_PROVIDER = "${llm_provider}"
LLM_TEMPERATURE = "${llm_temperature}"
OPENAI_API_KEY = ""
OPENAI_BASE_URL = "https://openrouter.ai/api/v1"
OPENAI_TEMPERATURE = "${llm_temperature}"
SECRET_KEY = "${jwt_secret}"
ANTHROPIC_API_KEY = ""
DEEPSEEK_API_KEY = ""
GROQ_API_KEY = ""
TOGETHER_API_KEY = ""
MISTRAL_API_KEY = ""
GEMINI_API_TOKEN = ""

[[config.mounts]]
filePath = "config.yml"
serviceName = "crawl4ai"
content = """
app:
  title: "Crawl4AI API"
  version: "0.8.0"
  host: "0.0.0.0"
  port: 11235
  reload: false
  workers: 1
  timeout_keep_alive: 300

llm:
  provider: "${llm_provider}"

redis:
  host: "localhost"
  port: 6379
  db: 0
  password: ""
  ssl: false
  ssl_cert_reqs: null
  ssl_ca_certs: null
  ssl_certfile: null
  ssl_keyfile: null

rate_limiting:
  enabled: true
  default_limit: "${default_rate_limit}"
  trusted_proxies: []
  storage_uri: "memory://"

security:
  enabled: ${security_enabled}
  jwt_enabled: ${jwt_enabled}
  https_redirect: false
  trusted_hosts:
    - "${main_domain}"
    - "localhost"
    - "127.0.0.1"
    - "crawl4ai"
  headers:
    x_content_type_options: "nosniff"
    x_frame_options: "DENY"
    content_security_policy: "default-src 'self'"
    strict_transport_security: "max-age=63072000; includeSubDomains"

crawler:
  base_config:
    simulate_user: true
  memory_threshold_percent: 90.0
  rate_limiter:
    enabled: true
    base_delay: [1.0, 2.0]
  timeouts:
    stream_init: 30.0
    batch_process: 300.0
  pool:
    max_pages: ${max_pages}
    idle_ttl_sec: 300
  browser:
    kwargs:
      headless: true
      text_mode: true
    extra_args:
      - "--no-sandbox"
      - "--disable-dev-shm-usage"
      - "--disable-gpu"
      - "--disable-software-rasterizer"
      - "--allow-insecure-localhost"
      - "--ignore-certificate-errors"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

observability:
  prometheus:
    enabled: true
    endpoint: "/metrics"
  health_check:
    endpoint: "/health"

webhooks:
  enabled: true
  default_url: null
  data_in_payload: false
  retry:
    max_attempts: 5
    initial_delay_ms: 1000
    max_delay_ms: 32000
    timeout_ms: 30000
  headers:
    User-Agent: "Crawl4AI-Webhook/1.0"
"""
