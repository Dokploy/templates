[variables]
main_domain = "${domain}"
secret_key = "${base64:32}"

[config]
env = [
  "DEFAULT_FROM_EMAIL=${email}",
  "GLITCHTIP_DOMAIN=https://${main_domain}",
  "GLITCHTIP_PORT=8000",
  "SECRET_KEY=${secret_key}",
]
mounts = []

[[config.domains]]
serviceName = "web"
port = 8000
host = "${main_domain}"
