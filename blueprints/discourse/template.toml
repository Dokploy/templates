[variables]
main_domain = "${domain}"
admin_email = "${email}"
postgres_password = "${password}"
redis_password = "${password}"

[config]
env = [
  "DISCOURSE_HOST=${main_domain}",
  "DISCOURSE_ADMIN_EMAIL=${admin_email}",
  "POSTGRES_PASSWORD=${postgres_password}",
  "REDIS_PASSWORD=${redis_password}",
]
mounts = []

[[config.domains]]
serviceName = "discourse-app"
port = 80
host = "${main_domain}"