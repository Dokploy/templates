version: "3.8"
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${postgres_password}
      - POSTGRES_DB=dify
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:6-alpine
    restart: always
    command: redis-server --requirepass ${redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  api:
    image: langgenius/dify-api:latest
    restart: always
    environment:
      - DB_USERNAME=postgres
      - DB_PASSWORD=${postgres_password}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${redis_password}
      - SECRET_KEY=${secret_key}
      - DEPLOY_ENV=PRODUCTION
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M

  worker:
    image: langgenius/dify-api:latest
    restart: always
    entrypoint: /bin/bash /app/api/entrypoint.sh
    environment:
      - DB_USERNAME=postgres
      - DB_PASSWORD=${postgres_password}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${redis_password}
      - SECRET_KEY=${secret_key}
      - DEPLOY_ENV=PRODUCTION
      - MODE=worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M

  web:
    image: langgenius/dify-web:latest
    restart: always
    environment:
      - CONSOLE_API_URL=http://api:5001
      - APP_API_URL=http://api:5001
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data: {}
  redis_data: {}
