version: '3.8'

services:
  reef-rpc:
    image: anukulpandey/reef-chain-node:linux-2
    working_dir: /workspace

    ports:
      - "${P2P_PORT}:${P2P_PORT}"
      - "${RPC_PORT}:${RPC_PORT}"

    environment:
      SPEC_URL: ${SPEC_URL}
      BOOTNODE_NODE_KEY: ${BOOTNODE_NODE_KEY}
      BOOTNODE_IP: ${BOOTNODE_IP}
      P2P_PORT: ${P2P_PORT}
      RPC_PORT: ${RPC_PORT}

    volumes:
      - ./output:/output

    entrypoint: /bin/sh
    command: -c "
      set -e &&

      echo '📦 Installing dependencies...' &&
      apt-get update &&
      apt-get install -y wget ca-certificates &&

      echo '📥 Downloading start-rpc.sh...' &&
      mkdir -p /workspace/rpc/scripts &&
      wget -O /workspace/rpc/scripts/start-rpc.sh \
        https://raw.githubusercontent.com/anukulpandey/dokploy-reef-chain-scripts/main/rpc/scripts/start-rpc.sh &&

      echo '🔧 Making script executable...' &&
      chmod +x /workspace/rpc/scripts/start-rpc.sh &&

      echo '🚀 Starting RPC' &&
      exec /workspace/rpc/scripts/start-rpc.sh"
