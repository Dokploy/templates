[[variables]]
name = "DATABASE_NAME"
label = "Database Name"
defaultValue = "matomo"

[[variables]]
name = "DATABASE_USERNAME"
label = "Database User"
defaultValue = "matomo"

[[variables]]
name = "DATABASE_PASSWORD"
label = "Database Password"
defaultValue = "change-me-user"
