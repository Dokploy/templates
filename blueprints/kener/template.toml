[variables]
main_domain = "${domain}"
KENER_SECRET_KEY = "${password:64}"

[config]
[[config.domains]]
serviceName = "kener"
port = 3000
host = "${main_domain}"

[config.env]
TZ = "Etc/UTC"
KENER_SECRET_KEY = "${KENER_SECRET_KEY}" # 🔐 API key / secret
ORIGIN = "http://localhost:3000"
REDIS_URL = "redis://redis:6379"
DATABASE_URL = "sqlite://./database/kener.sqlite.db"
RESEND_API_KEY = ""
RESEND_SENDER_EMAIL = ""

[[config.mounts]]
type = "volume"
source = "data"
target = "/app/database"

[[config.mounts]]
type = "volume"
source = "redis_data"
target = "/data"

[[config.mounts]]
type = "bind"
source = "../files/uploads"
target = "/app/uploads"
