version: "3.9"

services:
  reef-spec-api:
    image: anukulpandey/reef-chain-node:linux-2
    working_dir: /workspace

    volumes:
      - ./output:/output

    ports:
      - "8000"

    entrypoint: /bin/sh
    command: -c "
      set -e &&
      apt-get update &&
      apt-get install -y python3 python3-pip wget ca-certificates &&

      echo '📥 Downloading API + scripts...' &&
      mkdir -p /workspace/scripts &&

      wget -O /workspace/scripts/update-spec.py \
        https://raw.githubusercontent.com/anukulpandey/dokploy-reef-chain-scripts/main/spec-generator/scripts/update-spec.py &&

      wget -O /workspace/scripts/update-spec.sh \
        https://raw.githubusercontent.com/anukulpandey/dokploy-reef-chain-scripts/main/spec-generator/scripts/update-spec.sh &&

      wget -O /workspace/api.py \
        https://raw.githubusercontent.com/anukulpandey/dokploy-reef-chain-scripts/main/spec-generator/api/api.py &&

      chmod +x /workspace/scripts/update-spec.sh &&

      pip3 install flask &&

      echo '🚀 Starting Spec Generator API on port 8000...' &&
      python3 /workspace/api.py"
