name = "Matomo"
id = "matomo"
description = "Leading open-source web analytics platform"

[[variables]]
name = "DOMAINS"
label = "Matomo Domain"
defaultValue = ""
placeholder = "analytics.example.com"

[[variables]]
name = "DATABASE_ROOT_PASSWORD"
label = "MariaDB Root Password"
